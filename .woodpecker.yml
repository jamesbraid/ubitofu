---
# CI for unifi-tofu-import.
#
# Gitleaks arrangement (two tiers, both blocking):
#   - gitleaks-history: default rules + in-repo .gitleaks.toml over the FULL
#     git history. Catches real credentials anywhere in history.
#   - private-leak-scan: a private-identifier denylist over the HEAD tree.
#     This repo is destined for a public mirror, so the denylist cannot live
#     here — the patterns ARE the identifiers it blocks. It lives in the
#     private infra monorepo (ci/gitleaks-mirror-gate.toml) and is fetched
#     over the Forgejo raw API at scan time; the step fails closed if the
#     fetch fails. The scan runs against a clean `git archive HEAD` export:
#     earlier steps share this workspace and their build artifacts
#     (__pycache__ etc.) must not be scanned.
#   Running the private denylist over full HISTORY is deliberately NOT a CI
#   gate yet: pre-genericize test-data commits contain known hits, so it
#   would be permanently red until the pre-mirror history decision
#   (scrub vs squash) is made. It is a mandatory pre-publish check at
#   mirror time instead.

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0  # full history — gitleaks-history scans every commit

steps:
  - name: pytest
    image: docker.io/library/python:3.12
    commands:
      # tests shell out to `tofu fmt`
      - curl -fsSL https://github.com/opentofu/opentofu/releases/download/v1.12.0/tofu_1.12.0_linux_amd64.tar.gz | tar -xz -C /usr/local/bin tofu
      - pip install -q -e .[dev]
      - python -m pytest
    when:
      event: [push, pull_request, manual]

  - name: ruff
    image: docker.io/library/python:3.12
    commands:
      - pip install -q -e .[dev]
      - ruff check .
    when:
      event: [push, pull_request, manual]

  - name: mypy
    image: docker.io/library/python:3.12
    commands:
      - pip install -q -e .[dev]
      - mypy
    when:
      event: [push, pull_request, manual]

  - name: gitleaks-history
    image: zricethezav/gitleaks:latest
    commands:
      - gitleaks git . --config .gitleaks.toml --redact --no-banner --exit-code 1
    when:
      event: [push, pull_request, manual]

  - name: private-leak-scan
    image: zricethezav/gitleaks:latest
    environment:
      FORGEJO_CI_TOKEN:
        from_secret: forgejo_ci_token
    commands:
      # Fetch the private denylist from the monorepo. TRANSITIONAL: fall back
      # to the PR branch until infra/ansible#97 merges; drop the fallback then.
      - >-
        wget -q --header "Authorization: token $${FORGEJO_CI_TOKEN}"
        -O /tmp/mirror-gate.toml
        "${CI_FORGE_URL}/api/v1/repos/infra/ansible/raw/ci/gitleaks-mirror-gate.toml"
        ||
        wget -q --header "Authorization: token $${FORGEJO_CI_TOKEN}"
        -O /tmp/mirror-gate.toml
        "${CI_FORGE_URL}/api/v1/repos/infra/ansible/raw/ci/gitleaks-mirror-gate.toml?ref=ci%2Fgitleaks-mirror-gate"
      # Scan exactly the committed tree, not the shared workspace.
      - mkdir -p /tmp/head-tree
      - git archive HEAD | tar -x -C /tmp/head-tree
      - gitleaks dir /tmp/head-tree --config /tmp/mirror-gate.toml --redact --no-banner --exit-code 1
    when:
      # forgejo_ci_token is an org secret scoped to push+manual events only.
      event: [push, manual]
