---
# ubitofu CI — lint, type-check, test, secret-scan, mutation-testing. Public
# images only; no credentials in this file, so anyone can fork and run identical CI.
#
# On tag events: test + gitleaks run, then build-dist, then release-forgejo
# creates a Forgejo release with wheel + sdist assets attached. Mirror sync
# (Forgejo→GitHub) and PyPI publish continue to run from the private monorepo.

steps:
  - name: test
    image: python:3.11-bookworm
    commands:
      - bash ci/install-tofu.sh
      - pip install -e ".[dev]"
      - ruff check .
      - mypy src
      - pytest -q
    when:
      event: [push, pull_request, tag, manual]

  - name: gitleaks
    image: zricethezav/gitleaks:latest
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
    when:
      event: [push, pull_request, tag, manual]

  # Build wheel + sdist so plugin-release can attach them as release assets.
  - name: build-dist
    image: python:3.11-slim
    commands:
      - pip install build
      - python -m build
    depends_on: [test]
    when:
      event: tag

  # Create a Forgejo release for the tag with wheel + sdist attached. Runs only
  # after the dist build AND gitleaks gate both pass. base_url comes from
  # CI_FORGE_URL (injected by Woodpecker — nothing hardcoded here).
  - name: release-forgejo
    image: woodpeckerci/plugin-release
    settings:
      api_key:
        from_secret: forgejo_ci_token
      files:
        - dist/*.whl
        - dist/*.tar.gz
      title: "${CI_COMMIT_TAG}"
      note: CHANGELOG.md
    depends_on: [build-dist, gitleaks]
    when:
      event: tag

  # Layer 1: per-PR incremental gate.
  # Runs only when a correctness-critical module is touched; scopes mutmut to the
  # changed modules and fails if any mutant survives.  Depends on the test step so
  # it only fires after the baseline suite passes.
  - name: mutation-pr
    image: python:3.11-bookworm
    depends_on: [test]
    commands:
      - bash ci/install-tofu.sh
      - pip install -e ".[dev]"
      # Changed modules come from Woodpecker's native CI_PIPELINE_FILES — no
      # git fetch/diff needed.
      - python ci/mutation_gate.py pr
    when:
      event: pull_request
      # pipeline.py is intentionally omitted: its mutation backlog is not yet
      # cleared, so it is gated only by the weekly sweep, not per-PR. Keep this
      # list in sync with MODULES in ci/mutation_gate.py; re-add pipeline.py once
      # its survivors reach zero.
      path:
        include:
          - src/ubitofu/enumerator.py
          - src/ubitofu/import_emitter.py
          - src/ubitofu/hcl_surgeon.py

  # Layer 2: weekly full sweep backstop.
  # Mutation-tests all four modules; fails if the score drops below 80 %.
  # To add the weekly cron (run once, not committed here):
  #   woodpecker-cli cron add --repo <owner/repo> \
  #     --name mutation-weekly --expr "0 2 * * 1" --branch main
  - name: mutation-sweep
    image: python:3.11-bookworm
    commands:
      - bash ci/install-tofu.sh
      - pip install -e ".[dev]"
      - python ci/mutation_gate.py sweep --threshold 80
    when:
      event: [cron, manual]
